<div class="db-page-header mb-4">
  <h2 class="fw-bold mb-1">Notifications</h2>
  <p class="text-muted">Stay updated on your pickups, applications, and messages.</p>
</div>

<div class="row">
  <div class="col-md-8 col-lg-6 mx-auto">
    <div class="card shadow-sm border-0 rounded-4 overflow-hidden mb-4">
      <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-bold"><i class="bi bi-bell me-2 text-primary"></i>All Notifications</h5>
      </div>
      
      <div class="list-group list-group-flush" *ngIf="(notifications$ | async) as notifications">
        <div *ngIf="notifications.length === 0" class="text-center py-5 text-muted">
          <i class="bi bi-bell-slash fs-1 text-opacity-50 mb-3 d-block"></i>
          <h5>You're all caught up!</h5>
          <p class="mb-0">No new notifications at this time.</p>
        </div>

        <div *ngFor="let notif of notifications" 
             class="list-group-item py-3 notification-item position-relative"
             [class.bg-light]="!notif.read"
             [class.unread]="!notif.read">
             
          <div class="d-flex gap-3 align-items-start">
            <div class="notif-icon-wrapper rounded-circle p-2 bg-opacity-10 bg-{{notif.type}} text-{{notif.type}}">
              <i class="bi bi-{{getIconForType(notif.type)}} fs-5"></i>
            </div>
            
            <div class="flex-grow-1">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <strong class="text-dark">{{notif.title}}</strong>
                <small class="text-muted">{{notif.timestamp | date:'shortTime'}}</small>
              </div>
              <p class="mb-1 text-muted text-wrap" style="font-size: 0.9rem;">{{notif.message}}</p>
              <div *ngIf="!notif.read" class="mt-2">
                <button class="btn btn-sm btn-outline-primary rounded-pill px-3" (click)="markAsRead(notif.id)">
                  <i class="bi bi-check2 me-1"></i>Mark as read
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
