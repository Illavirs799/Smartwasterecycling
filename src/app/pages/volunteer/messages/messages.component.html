<div class="db-body animate-fade-in">
  <h1 class="db-page-title">💬 Communications Hub</h1>
  <p class="db-page-sub">Coordinate with citizens regarding pickup details and scheduling</p>

  <div *ngIf="(conversations$ | async) as convos">
    <!-- Empty State -->
    <div *ngIf="convos.length === 0" class="card border-0 shadow-sm rounded-4 text-center p-5 bg-white mb-4">
      <div class="mx-auto mb-3 bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
        <i class="bi bi-chat-square-dots fs-1"></i>
      </div>
      <h5 class="fw-bold mb-2">No active messages</h5>
      <p class="text-muted small mb-0">You have no message history. Stay tuned for new pickup alerts!</p>
    </div>

    <!-- Conversation List -->
    <div class="row g-3" *ngIf="convos.length > 0">
      <div class="col-12" *ngFor="let conv of convos">
        <a [routerLink]="['/chat', conv.partnerId, conv.partnerName]" 
           class="card border-0 shadow-sm text-decoration-none text-dark hover-lift transition-all rounded-4">
          <div class="card-body p-3 p-md-4 d-flex align-items-center">
            
            <div class="bg-success bg-opacity-10 text-success rounded-circle d-flex align-items-center justify-content-center me-3 flex-shrink-0" style="width: 50px; height: 50px;">
              <i class="bi bi-person-fill fs-3"></i>
            </div>
            
            <div class="flex-grow-1 overflow-hidden pe-2">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <h6 class="mb-0 fw-bold text-truncate">{{ conv.partnerName }}</h6>
                <small class="text-muted ms-2 text-nowrap opacity-75">{{ conv.lastMessageTime | date:'shortTime' }}</small>
              </div>
              <p class="mb-0 small text-truncate" 
                 [ngClass]="conv.unreadCount > 0 ? 'fw-bold text-dark' : 'text-muted'">
                {{ conv.lastMessage }}
              </p>
            </div>
            
            <div class="ms-2 ms-md-3 d-flex align-items-center flex-shrink-0" *ngIf="conv.unreadCount > 0">
              <span class="badge bg-danger rounded-pill">{{ conv.unreadCount }}</span>
            </div>
            
          </div>
        </a>
      </div>
    </div>
  </div>
</div>
