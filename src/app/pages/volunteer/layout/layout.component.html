<div class="db-layout" [class.sidebar-collapsed]="sidebarCollapsed" [class.mobile-sidebar-open]="!sidebarCollapsed">
  <!-- Mobile Navbar -->
  <nav class="navbar navbar-dark bg-dark d-md-none fixed-top shadow-sm px-3" style="z-index: 1060;">
    <div class="d-flex align-items-center w-100 justify-content-between">
      <div class="d-flex align-items-center">
        <div class="db-brand">
          <div class="db-brand-icon-wrap" style="width: 30px; height: 30px; font-size: 14px; background: linear-gradient(135deg, rgba(0,200,255,0.15), rgba(167,139,250,0.1));">♻️</div>
          <span class="db-brand-name" style="font-size: 16px;">WasteZero</span>
        </div>
      </div>
      <div class="db-avatar shadow-sm" style="width: 32px; height: 32px; font-size: 12px;" *ngIf="currentUser as user" routerLink="/volunteer/profile">
        <img *ngIf="user.profileImage" [src]="user.profileImage" alt="Profile" class="avatar-img" />
        <span *ngIf="!user.profileImage">{{ user.name.charAt(0) }}</span>
      </div>
    </div>
  </nav>

  <!-- Mobile Bottom Navbar -->
  <nav class="navbar fixed-bottom bg-dark border-top border-light border-opacity-10 d-md-none px-2 py-0 bottom-nav">
    <div class="container-fluid justify-content-around py-2">
      <a class="nav-link-bottom" routerLink="/volunteer/dashboard" routerLinkActive="active">
        <span class="bottom-nav-icon">📊</span>
        <span>Home</span>
      </a>
      <a class="nav-link-bottom" routerLink="/volunteer/opportunities" routerLinkActive="active">
        <span class="bottom-nav-icon">🛰️</span>
        <span>Tasks</span>
      </a>
      <a class="nav-link-bottom" routerLink="/volunteer/my-pickups" routerLinkActive="active">
        <span class="bottom-nav-icon">🚛</span>
        <span>Pickups</span>
      </a>
      <a class="nav-link-bottom position-relative" routerLink="/volunteer/messages" routerLinkActive="active">
        <span class="bottom-nav-icon">💬</span>
        <span>Messages</span>
        <span class="badge rounded-pill bg-danger border border-white position-absolute top-0 start-50 translate-middle-y" 
              style="font-size: 10px;"
              *ngIf="(unreadCount$ | async) as count">
          {{ count }}
        </span>
      </a>
      <a class="nav-link-bottom" (click)="logout()" style="cursor: pointer;">
        <span class="bottom-nav-icon">🚪</span>
        <span>Logout</span>
      </a>
    </div>
  </nav>

  <!-- SIDEBAR -->
  <aside class="db-sidebar">
    <div class="db-sidebar-glow"></div>
    
    <div class="db-sidebar-header">
      <div class="db-brand">
        <div class="db-brand-icon-wrap">♻️</div>
        <span class="db-brand-name" *ngIf="!sidebarCollapsed">WasteZero</span>
      </div>
      <button class="db-toggle-btn" (click)="toggleSidebar()">
        {{ sidebarCollapsed ? '→' : '←' }}
      </button>
    </div>

    <!-- User Profile Summary -->
    <div class="db-user-block" *ngIf="!sidebarCollapsed && currentUser as user">
      <div class="db-avatar shadow-sm">
        <img *ngIf="user.profileImage" [src]="user.profileImage" alt="Profile" class="avatar-img" />
        <span *ngIf="!user.profileImage">{{ user.name.charAt(0) }}</span>
      </div>
      <div class="db-user-info">
        <div class="db-user-name">{{ user.name }}</div>
        <div class="db-role-chip">
          <span>🛡️</span> Volunteer
        </div>
      </div>
    </div>
    <div class="db-avatar-mini shadow-sm" *ngIf="sidebarCollapsed && currentUser as user">
      <img *ngIf="user.profileImage" [src]="user.profileImage" alt="Profile" class="avatar-img" />
      <span *ngIf="!user.profileImage">{{ user.name.charAt(0) }}</span>
    </div>

    <!-- Navigation -->
    <nav class="db-nav">
      <div class="db-nav-section" *ngIf="!sidebarCollapsed">Agent Dashboard</div>
      
      <a routerLink="/volunteer/dashboard" routerLinkActive="active" class="db-nav-item">
        <span class="db-nav-icon">📊</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">Dashboard</span>
      </a>

      <a routerLink="/volunteer/opportunities" routerLinkActive="active" class="db-nav-item">
        <span class="db-nav-icon">🛰️</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">Available Tasks</span>
      </a>

      <a routerLink="/volunteer/my-pickups" routerLinkActive="active" class="db-nav-item">
        <span class="db-nav-icon">🚛</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">My Pickups</span>
      </a>

      <div class="db-nav-divider"></div>
      <div class="db-nav-section" *ngIf="!sidebarCollapsed">Account</div>

      <a routerLink="/volunteer/messages" routerLinkActive="active" class="db-nav-item">
        <span class="db-nav-icon">💬</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">Messages</span>
        <span class="db-badge" *ngIf="!sidebarCollapsed && (unreadCount$ | async) as count" [class.d-none]="count === 0">
          {{ count }}
        </span>
      </a>

      <a routerLink="/volunteer/profile" routerLinkActive="active" class="db-nav-item">
        <span class="db-nav-icon">👤</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">Profile</span>
      </a>
    </nav>

    <!-- Footer -->
    <div class="db-sidebar-footer">
      <button class="db-theme-toggle" (click)="toggleTheme()">
        <span class="db-nav-icon">{{ (isDarkMode$ | async) ? '☀️' : '🌙' }}</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">
          {{ (isDarkMode$ | async) ? 'Light Mode' : 'Dark Mode' }}
        </span>
      </button>
      
      <button class="db-nav-item" (click)="logout()">
        <span class="db-nav-icon">🚪</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="db-content">
    <router-outlet></router-outlet>
  </main>
</div>
