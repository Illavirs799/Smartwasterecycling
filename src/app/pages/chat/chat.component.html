<div class="container-fluid bg-light min-vh-100 py-4">
  <div class="container max-w-800px h-80vh d-flex flex-column">
    <!-- Chat Header -->
    <div class="card border-0 shadow-sm rounded-4 rounded-bottom-0 overflow-hidden">
      <div class="card-body p-3 p-md-4 d-flex align-items-center justify-content-between bg-white border-bottom">
        <div class="d-flex align-items-center">
          <button (click)="goBack()" class="btn btn-light btn-sm rounded-circle me-3 border-0">
            <i class="bi bi-chevron-left"></i>
          </button>
          <div class="bg-success bg-opacity-10 text-success rounded-circle p-2 me-3">
            <i class="bi bi-person-badge fs-4"></i>
          </div>
          <div>
            <h5 class="fw-bold mb-0 text-dark">{{ receiverName }}</h5>
            <small class="text-success"><i class="bi bi-circle-fill me-1 small"></i> Online</small>
          </div>
        </div>
        <div>
          <button class="btn btn-light btn-sm rounded-circle me-2"><i class="bi bi-telephone"></i></button>
          <button class="btn btn-light btn-sm rounded-circle"><i class="bi bi-info-circle"></i></button>
        </div>
      </div>
    </div>

    <!-- Chat Messages -->
    <div class="card border-0 shadow-sm flex-grow-1 rounded-0 chat-messages overflow-auto bg-white p-4">
      <div *ngIf="messages.length === 0" class="h-100 d-flex flex-column align-items-center justify-content-center text-muted opacity-50">
        <i class="bi bi-chat-dots display-4 mb-3"></i>
        <p>No messages yet. Start the conversation!</p>
      </div>

      <div *ngFor="let msg of messages" class="mb-3 d-flex" [ngClass]="msg.senderId === currentUser?.id ? 'justify-content-end' : 'justify-content-start'">
        <div class="message-bubble px-3 py-2 rounded-4 max-w-75 shadow-sm" 
             [ngClass]="msg.senderId === currentUser?.id ? 'bg-success text-white' : 'bg-light text-dark'">
          <div class="small fw-bold mb-1" *ngIf="msg.senderId !== currentUser?.id">{{ msg.senderName }}</div>
          
          <!-- Text Content -->
          <div class="content" *ngIf="msg.messageType === 'text' || !msg.messageType">{{ msg.content }}</div>
          
          <!-- Image Content -->
          <div class="content image-msg" *ngIf="msg.messageType === 'image'">
            <img [src]="msg.mediaUrl" class="img-fluid rounded-3 mb-1 mt-1 cursor-pointer" alt="Shared photo" style="max-height: 250px;">
            <div class="small opacity-75">{{ msg.content }}</div>
          </div>

          <!-- Audio Content -->
          <div class="content audio-msg" *ngIf="msg.messageType === 'audio'">
            <audio controls class="w-100 mb-1 mt-1" style="height: 35px; min-width: 200px;">
              <source [src]="msg.mediaUrl" type="audio/mpeg">
              Your browser does not support the audio element.
            </audio>
            <div class="small opacity-75">{{ msg.content }}</div>
          </div>

          <!-- Location/Link Content -->
          <div class="content link-msg" *ngIf="msg.messageType === 'location' || msg.messageType === 'link'">
            <a [href]="msg.mediaUrl" target="_blank" class="text-decoration-none d-block p-2 rounded-3" 
               [ngClass]="msg.senderId === currentUser?.id ? 'bg-white bg-opacity-25 text-white' : 'bg-success bg-opacity-10 text-success'">
              <i class="bi bi-geo-alt-fill me-2"></i> {{ msg.content }}
            </a>
          </div>

          <div class="text-end mt-1" style="font-size: 10px; opacity: 0.8;">
            {{ msg.timestamp | date:'shortTime' }}
          </div>
        </div>
      </div>
    </div>

    <!-- Chat Input -->
    <div class="card border-0 shadow-sm rounded-4 rounded-top-0 overflow-hidden border-top">
      <!-- Options Menu -->
      <div class="bg-light p-2 d-flex gap-2 justify-content-center border-bottom animate-fade-in flex-wrap" *ngIf="showOptions">
        <button (click)="galleryInput.click()" class="btn btn-white shadow-sm btn-sm px-3 rounded-pill border-0 d-flex align-items-center">
          <i class="bi bi-images text-primary me-2"></i> Gallery
        </button>
        <button (click)="cameraInput.click()" class="btn btn-white shadow-sm btn-sm px-3 rounded-pill border-0 d-flex align-items-center">
          <i class="bi bi-camera text-info me-2"></i> Camera
        </button>
        <button (click)="onShareAudio()" class="btn btn-white shadow-sm btn-sm px-3 rounded-pill border-0 d-flex align-items-center">
          <i class="bi bi-mic text-danger me-2"></i> Audio
        </button>
        <button (click)="onShareLiveLink()" class="btn btn-white shadow-sm btn-sm px-3 rounded-pill border-0 d-flex align-items-center">
          <i class="bi bi-geo-alt text-success me-2"></i> Location
        </button>

        <!-- Hidden Inputs for File Selection -->
        <input type="file" #galleryInput hidden accept="image/*" (change)="handleFileUpload($event, 'image')">
        <input type="file" #cameraInput hidden accept="image/*" capture="environment" (change)="handleFileUpload($event, 'image')">
      </div>

      <div class="card-body p-3 p-md-4 bg-white">
        <form (ngSubmit)="onSendMessage()" class="d-flex gap-2">
          <button type="button" (click)="toggleOptions()" class="btn btn-light btn-lg rounded-circle border-0 shadow-sm" [class.bg-success]="showOptions" [class.text-white]="showOptions">
            <i class="bi" [class.bi-plus-lg]="!showOptions" [class.bi-x-lg]="showOptions"></i>
          </button>
          <input type="text" class="form-control form-control-lg bg-light border-0 px-4" 
                 name="message" [(ngModel)]="newMessage" placeholder="Type your message..." autocomplete="off">
          <button type="submit" class="btn btn-success btn-lg px-4 rounded-pill shadow-sm" [disabled]="!newMessage.trim()">
            <i class="bi bi-send-fill"></i>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
